version: "3.8"

services:

  redis:
    image: redis:7
    restart: always

  scanner:
    image: python:3.10
    working_dir: /app
    volumes:
      - ./scanner.py:/app/scanner.py
    command: sh -c "pip install yfinance pandas requests redis && python scanner.py"
    depends_on:
      - redis
    restart: always

  app:
    image: python:3.10
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./app.py:/app/app.py
    environment:
      REDIS_HOST: redis
    command: sh -c "pip install streamlit pandas redis && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      - redis
    restart: always
